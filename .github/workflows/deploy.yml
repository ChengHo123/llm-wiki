name: Build & Deploy

# Triggers:
#   - Pushing a tag matching v* (e.g. v1.0.0)  → build on Oracle VM (native arm64), deploy
#   - Manual dispatch with tag                  → redeploy existing tag (pull from GHCR, no rebuild)
#   - Manual dispatch without tag               → rebuild & deploy current commit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing image tag to redeploy (e.g. v1.0.0). Leave blank to rebuild & deploy.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build + Deploy（tag push 或 manual 不帶 tag）──────────────────────────
  build-and-deploy:
    if: github.event_name == 'push' || github.event.inputs.tag == ''
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve lowercase owner
        id: owner
        run: echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build backend (native arm64, no QEMU)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:latest
          cache-from: type=local,src=/tmp/buildx-cache/backend
          cache-to: type=local,dest=/tmp/buildx-cache/backend-new,mode=max

      - name: Build frontend (native arm64, no QEMU)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:latest
          cache-from: type=local,src=/tmp/buildx-cache/frontend
          cache-to: type=local,dest=/tmp/buildx-cache/frontend-new,mode=max

      - name: Rotate build cache
        if: always()
        run: |
          rm -rf /tmp/buildx-cache/backend /tmp/buildx-cache/frontend
          mv /tmp/buildx-cache/backend-new /tmp/buildx-cache/backend 2>/dev/null || true
          mv /tmp/buildx-cache/frontend-new /tmp/buildx-cache/frontend 2>/dev/null || true

      - name: Push to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:latest
          docker push ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:latest

      - name: Deploy (images already local, skip pull)
        run: |
          cd /opt/llm-wiki
          git fetch --tags --prune
          git checkout "${{ github.ref_name }}"
          ./scripts/deploy.sh "${{ github.ref_name }}" --no-pull

  # ── Redeploy（manual dispatch 帶指定 tag，不重 build）──────────────────────
  redeploy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Redeploy existing tag
        run: |
          cd /opt/llm-wiki
          git fetch --tags --prune
          git checkout "${{ github.event.inputs.tag }}"
          ./scripts/deploy.sh "${{ github.event.inputs.tag }}"
