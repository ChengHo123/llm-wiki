name: Build & Deploy

# Triggers:
#   - Pushing a tag matching v* (e.g. v1.0.0)  → build arm64 images, push to GHCR, deploy to Oracle VM
#   - Manual dispatch from Actions UI          → same flow, with optional tag input
#
# All other pushes (master, branches, PRs) do nothing — keeps CI quiet and free.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing image tag to deploy (e.g. v1.0.0). Leave blank to redeploy current.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build:
    # Skip build when manually dispatched without rebuild — just redeploy existing image
    if: github.event_name == 'push' || github.event.inputs.tag == ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR 強制 image path 全小寫，但 github.repository_owner 保留大小寫，需轉小寫
      - name: Resolve lowercase owner
        id: owner
        run: echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/llm-wiki-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    needs: [build]
    # Run deploy even if build was skipped (manual redeploy of existing tag)
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/llm-wiki
            git fetch --tags --prune
            git checkout "${{ steps.tag.outputs.value }}"
            ./scripts/deploy.sh "${{ steps.tag.outputs.value }}"
